spring.application.name=request-persistence-service
server.error.include-stacktrace=never
server.error.include-message=always
spring.datasource.url=jdbc:h2:mem:workflowdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.profiles.active=worker
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
worker:
  polling-interval: 1000
  enabled: true
  polling-interval-ms: 5000
  max-retry-count: 3
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
logging.level.org.springframework.kafka=DEBUG
logging.level.org.apache.kafka=INFO
spring.application.name=request-persistence-service
#############################################
# Kafka Consumer
#############################################

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=request-persistence-group

spring.kafka.consumer.auto-offset-reset=earliest
app.kafka.topic.workflow-created=workflow-created-v2

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.consumer.properties.spring.json.value.default.type=com.bank.collections.persistence.event.WorkflowCreatedEvent

server.port =8082
spring.kafka.consumer.properties.spring.json.use.type.headers=false

spring.kafka.consumer.properties.spring.json.value.default.type=com.bank.collections.persistence.event.WorkflowCreatedEvent